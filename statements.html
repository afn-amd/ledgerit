<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#ffffff" />
  <script>
    /* set theme before paint to avoid a flash */
    (function () {
      try {
        var s = localStorage.getItem("theme");
        var t = s || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", t);
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute("content", t === "dark" ? "#090d18" : "#ffffff");
      } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
    })();
  </script>
  <title>My Statements — Ledgerit</title>

  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #ffffff; --bg-soft: #f6f8fc; --bg-tint: #eef3fb; --surface: #ffffff;
      --primary: #2563eb; --primary-dark: #1d4ed8; --primary-soft: #e8effd;
      --ink: #0b1220; --ink-soft: #1e293b; --muted: #64748b; --border: #e2e8f0;
      --green: #16a34a; --danger: #dc2626;
      --shadow-sm: 0 1px 2px rgba(15,23,42,0.04);
      --shadow: 0 12px 34px rgba(15,23,42,0.07);
      --shadow-lg: 0 24px 60px rgba(15,23,42,0.12);
      --radius: 18px; --maxw: 1180px;
      --header-bg: rgba(255,255,255,0.82);
      --hover-border: #cbd5e1;
    }
    :root[data-theme="dark"] {
      --bg: #090d18; --bg-soft: #0f1424; --bg-tint: #151b30; --surface: #0f1526;
      --primary: #3b82f6; --primary-dark: #2563eb; --primary-soft: #16213f;
      --ink: #e9edf6; --ink-soft: #c4cde0; --muted: #8a96ac; --border: #1f2840;
      --green: #22c55e; --danger: #f87171;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
      --shadow: 0 14px 38px rgba(0,0,0,0.5);
      --shadow-lg: 0 24px 60px rgba(0,0,0,0.6);
      --header-bg: rgba(9,13,24,0.72);
      --hover-border: #334155;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Manrope", system-ui, sans-serif;
      background: var(--bg); color: var(--ink); line-height: 1.6;
      min-height: 100vh; display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.25s ease, color 0.25s ease;
    }
    h1, h2, h3 { font-family: "Sora", sans-serif; }
    a { text-decoration: none; color: inherit; }
    .wrap { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 24px; }

    /* brand */
    .brand { display: inline-flex; align-items: center; gap: 11px; }
    .brand-logo { height: 38px; width: auto; display: block; }
    .logo-dark { display: none; }
    [data-theme="dark"] .logo-light { display: none; }
    [data-theme="dark"] .logo-dark { display: block; }

    /* theme switch */
    .theme-switch {
      display: inline-flex; align-items: center; gap: 2px;
      padding: 4px; border-radius: 999px;
      background: var(--bg-soft); border: 1px solid var(--border);
      cursor: pointer; transition: border-color 0.18s ease;
    }
    .theme-switch:hover { border-color: var(--hover-border); }
    .theme-switch .seg {
      width: 30px; height: 30px; border-radius: 999px;
      display: grid; place-items: center; color: var(--muted);
      transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    }
    .theme-switch .seg svg { width: 16px; height: 16px; display: block; }
    [data-theme="light"] .theme-switch .seg-sun { background: var(--surface); color: #f59e0b; box-shadow: var(--shadow-sm); }
    [data-theme="dark"] .theme-switch .seg-moon { background: var(--surface); color: #93c5fd; box-shadow: var(--shadow-sm); }

    /* buttons */
    .btn {
      font-family: "Manrope", sans-serif; font-weight: 600; font-size: 0.95rem;
      border: none; cursor: pointer; border-radius: 12px;
      padding: 11px 20px; transition: all 0.18s ease;
      display: inline-flex; align-items: center; gap: 8px; line-height: 1;
    }
    .btn-ghost { background: transparent; color: var(--ink-soft); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg-soft); border-color: var(--hover-border); }
    .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 8px 20px rgba(37,99,235,0.24); }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-sm { padding: 9px 16px; font-size: 0.9rem; border-radius: 10px; }
    .btn-icon { padding: 10px; }
    .btn-icon svg { width: 19px; height: 19px; display: block; }
    .btn:disabled { opacity: 0.6; cursor: default; transform: none; }
    .btn:focus-visible, .theme-switch:focus-visible {
      outline: 2px solid var(--primary); outline-offset: 2px;
    }

    /* header */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--header-bg);
      backdrop-filter: saturate(160%) blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav { display: flex; align-items: center; justify-content: space-between; height: 72px; }
    .nav-actions { display: flex; align-items: center; gap: 12px; }

    /* page */
    main { flex: 1 0 auto; padding: 32px 0 64px; }
    .page-head { margin-bottom: 28px; }
    .page-head h1 { font-family: "Lora", Georgia, serif; font-size: 1.9rem; font-weight: 700; letter-spacing: -0.01em; }
    .page-head p { color: var(--muted); margin-top: 6px; font-size: 0.95rem; }

    /* statement list */
    .stmt-list { display: flex; flex-direction: column; gap: 14px; }
    .stmt-card {
      display: flex; align-items: center; gap: 18px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      box-shadow: var(--shadow-sm); transition: border-color 0.16s, box-shadow 0.16s, transform 0.16s;
    }
    .stmt-card:hover { border-color: var(--hover-border); box-shadow: var(--shadow); transform: translateY(-1px); }
    /* failed conversions: not clickable, with a danger-tinted icon */
    .stmt-card.failed { cursor: default; }
    .stmt-card.failed:hover { transform: none; }
    .stmt-ic {
      width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0;
      background: var(--primary-soft); color: var(--primary);
      display: grid; place-items: center;
    }
    .stmt-ic.failed { background: rgba(220,38,38,0.12); color: var(--danger); }
    .stmt-ic svg { width: 22px; height: 22px; }
    .stmt-badge {
      display: inline-block; vertical-align: middle; margin-left: 8px;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.02em;
      color: var(--danger); background: rgba(220,38,38,0.12);
      padding: 2px 8px; border-radius: 999px;
    }
    .stmt-body { flex: 1; min-width: 0; }
    .stmt-name {
      font-weight: 700; color: var(--ink); font-size: 1.02rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .stmt-meta { color: var(--muted); font-size: 0.88rem; margin-top: 3px; }
    .stmt-meta .dot { margin: 0 8px; opacity: 0.5; }
    .stmt-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .btn-issue {
      background: none; border: none; cursor: pointer; padding: 4px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--muted); transition: color 0.16s ease, transform 0.16s ease;
    }
    .btn-issue:hover { color: var(--primary); transform: translateY(-1px); }
    .btn-issue:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 8px; }
    .btn-issue svg { width: 24px; height: 24px; }
    .btn-pdf {
      background: none; border: none; cursor: pointer; padding: 4px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--primary); transition: transform 0.16s ease, opacity 0.16s ease;
    }
    .btn-pdf:hover { transform: translateY(-1px); opacity: 0.85; }
    .btn-pdf:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 8px; }
    .btn-pdf svg { width: 22px; height: 22px; }

    /* Instant tooltips (the native title attr has a ~1s browser delay). */
    [data-tip] { position: relative; }
    [data-tip]::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 8px); left: 50%;
      transform: translateX(-50%);
      background: var(--ink); color: var(--bg);
      padding: 5px 9px; border-radius: 7px;
      font-size: 0.74rem; font-weight: 600; white-space: nowrap;
      box-shadow: var(--shadow); opacity: 0; pointer-events: none;
      transition: opacity 0.1s ease; z-index: 50;
    }
    [data-tip]:hover::after, [data-tip]:focus-visible::after { opacity: 1; }

    /* states (loading / empty / auth / error) */
    .state {
      text-align: center; padding: 60px 24px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow-sm);
    }
    .state .ic {
      width: 64px; height: 64px; border-radius: 18px; margin: 0 auto 18px;
      background: var(--primary-soft); color: var(--primary); display: grid; place-items: center;
    }
    .state .ic svg { width: 30px; height: 30px; }
    .state h2 { font-size: 1.3rem; font-weight: 700; color: var(--ink); }
    .state p { color: var(--muted); margin-top: 8px; max-width: 420px; margin-left: auto; margin-right: auto; }
    .state .btn { margin-top: 22px; }

    .spinner {
      width: 38px; height: 38px; margin: 0 auto;
      border: 3px solid var(--border); border-top-color: var(--primary);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* toast */
    .toast {
      position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
      background: var(--ink); color: var(--bg);
      padding: 12px 20px; border-radius: 12px; font-size: 0.92rem; font-weight: 600;
      box-shadow: var(--shadow-lg); opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease; z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* footer */
    footer { background: var(--primary); color: #fff; padding: 22px 0; flex-shrink: 0; }
    .foot-row { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; font-size: 0.9rem; }
    .foot-row a:hover { text-decoration: underline; }

    @media (max-width: 560px) {
      .nav { height: 64px; }
      .nav-actions { gap: 8px; }
      .nav-actions .btn { padding: 9px 14px; font-size: 0.9rem; }
      .stmt-card { padding: 15px 16px; gap: 14px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="wrap nav">
      <a class="brand" href="/upload.html">
        <img src="assets/logo.png" alt="Ledgerit" class="brand-logo logo-light" />
        <img src="assets/logo-white.png" alt="Ledgerit" class="brand-logo logo-dark" />
      </a>
      <div class="nav-actions">
        <button class="btn btn-ghost btn-icon" onclick="window.location.href='/upload.html'" title="Home" aria-label="Home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"/><path d="M9 21v-6h6v6"/></svg>
        </button>
        <button class="btn btn-primary" onclick="window.location.href='/plans.html'">Upgrade Plan</button>
        <a class="btn btn-ghost" id="adminLink" href="/admin.html" style="display:none;">Admin</a>
        <button class="btn btn-ghost" id="logoutBtn" onclick="logout()">Logout</button>
        <button class="theme-switch" id="themeToggle" type="button" role="switch" aria-label="Toggle light/dark mode" onclick="toggleTheme()">
          <span class="seg seg-sun" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </span>
          <span class="seg seg-moon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="wrap">
      <div class="page-head">
        <h1>My Statements</h1>
        <p>Your previously extracted bank statements. Open one to view, edit, or download it again.</p>
      </div>

      <div id="content">
        <!-- Loading state shown first; replaced once /api/me + /api/statements resolve. -->
        <div class="state">
          <div class="spinner"></div>
          <p style="margin-top:18px;">Loading your statements…</p>
        </div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    // ---- Theme toggle (light/dark) ----
    function applyTheme(t) {
      document.documentElement.setAttribute("data-theme", t);
      try { localStorage.setItem("theme", t); } catch (e) {}
      var m = document.querySelector('meta[name="theme-color"]');
      if (m) m.setAttribute("content", t === "dark" ? "#090d18" : "#ffffff");
    }
    function toggleTheme() {
      var cur = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
      applyTheme(cur === "dark" ? "light" : "dark");
    }

    function escHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }

    var toastTimer = null;
    function showToast(msg) {
      var t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { t.classList.remove("show"); }, 2600);
    }

    var content = document.getElementById("content");

    function fmtDate(iso) {
      if (!iso) return "—";
      var d = new Date(iso);
      if (isNaN(d)) return "—";
      return d.toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" }) +
        ", " + d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
    }

    // ---- Auth / logout ----
    async function logout() {
      var btn = document.getElementById("logoutBtn");
      if (btn) btn.disabled = true;
      try { await fetch("/api/logout", { method: "POST" }); } catch (e) {}
      window.location.href = "/login.html";
    }

    var DOC_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>';

    // Raised hand — looks like someone raising their hand to flag an issue.
    var HAND_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2"/><path d="M14 10V4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg>';

    // PDF document icon — same as the "View PDF" icon on results.html.
    var PDF_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';

    var WARN_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';

    function showAuthGate() {
      content.innerHTML =
        '<div class="state">' +
          '<div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>' +
          '<h2>Please sign in</h2>' +
          '<p>You need to be signed in to view your saved statements.</p>' +
          '<button class="btn btn-primary" onclick="window.location.href=\'/login.html\'">Sign in</button>' +
        '</div>';
    }

    function showEmpty() {
      content.innerHTML =
        '<div class="state">' +
          '<div class="ic">' + DOC_SVG + '</div>' +
          '<h2>No statements yet</h2>' +
          '<p>Upload a bank statement PDF and it will be saved here automatically for you to revisit.</p>' +
          '<button class="btn btn-primary" onclick="window.location.href=\'/upload.html\'">Upload a statement</button>' +
        '</div>';
    }

    function showError(msg) {
      content.innerHTML =
        '<div class="state">' +
          '<div class="ic" style="background:rgba(220,38,38,0.12);color:var(--danger);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>' +
          '<h2>Something went wrong</h2>' +
          '<p>' + escHtml(msg) + '</p>' +
          '<button class="btn btn-ghost" onclick="window.location.reload()">Try again</button>' +
        '</div>';
    }

    function renderList(items) {
      var rows = items.map(function (s) {
        var pageLabel = (s.page_count === 1 ? "1 page" : (s.page_count || 0) + " pages");

        // Failed conversions: no rows to view, so show a "Couldn't convert"
        // badge with the reason. The source PDF can still be downloaded and the
        // statement flagged — but the card itself isn't clickable to open.
        if (s.status === "failed") {
          var reason = s.error || "We couldn't read any transactions from this PDF";
          return '' +
            '<div class="stmt-card failed" data-id="' + escHtml(s.id) + '">' +
              '<div class="stmt-ic failed">' + WARN_SVG + '</div>' +
              '<div class="stmt-body">' +
                '<div class="stmt-name">' + escHtml(s.filename || "Untitled statement") +
                  '<span class="stmt-badge">Couldn\'t convert</span></div>' +
                '<div class="stmt-meta">' + escHtml(pageLabel) + '<span class="dot">·</span>' + escHtml(reason) + '<span class="dot">·</span>' + escHtml(fmtDate(s.created_at)) + '</div>' +
              '</div>' +
              '<div class="stmt-actions">' +
                '<button class="btn-pdf" type="button" data-download="' + escHtml(s.id) + '" data-tip="Download PDF" aria-label="Download PDF">' + PDF_SVG + '</button>' +
                '<button class="btn-issue" type="button" data-issue="' + escHtml(s.id) + '" data-tip="Raise an issue" aria-label="Raise an issue">' + HAND_SVG + '</button>' +
              '</div>' +
            '</div>';
        }

        var rowLabel = (s.row_count === 1 ? "1 row" : (s.row_count || 0) + " rows");
        return '' +
          '<div class="stmt-card" data-id="' + escHtml(s.id) + '">' +
            '<div class="stmt-ic">' + DOC_SVG + '</div>' +
            '<div class="stmt-body">' +
              '<div class="stmt-name">' + escHtml(s.filename || "Untitled statement") + '</div>' +
              '<div class="stmt-meta">' + escHtml(pageLabel) + '<span class="dot">·</span>' + escHtml(rowLabel) + '<span class="dot">·</span>' + escHtml(fmtDate(s.created_at)) + '</div>' +
            '</div>' +
            '<div class="stmt-actions">' +
              '<button class="btn btn-primary btn-sm" type="button" data-view="' + escHtml(s.id) + '">View</button>' +
              '<button class="btn-pdf" type="button" data-download="' + escHtml(s.id) + '" data-tip="Download PDF" aria-label="Download PDF">' + PDF_SVG + '</button>' +
              '<button class="btn-issue" type="button" data-issue="' + escHtml(s.id) + '" data-tip="Raise an issue" aria-label="Raise an issue">' + HAND_SVG + '</button>' +
            '</div>' +
          '</div>';
      }).join("");

      content.innerHTML = '<div class="stmt-list">' + rows + '</div>';

      // Only successful cards open the statement on click.
      content.querySelectorAll(".stmt-card:not(.failed)").forEach(function (card) {
        card.addEventListener("click", function () { viewStatement(card.getAttribute("data-id")); });
      });

      // Download the source PDF — don't let the click open the statement.
      content.querySelectorAll("[data-download]").forEach(function (btn) {
        btn.addEventListener("click", function (e) {
          e.stopPropagation();
          downloadPdf(btn.getAttribute("data-download"));
        });
      });

      // "Raise an issue" — don't let the click bubble up to the card (which opens the statement).
      content.querySelectorAll("[data-issue]").forEach(function (btn) {
        btn.addEventListener("click", function (e) {
          e.stopPropagation();
          raiseIssue(btn.getAttribute("data-issue"));
        });
      });
    }

    // Hit the owner-scoped download endpoint; it responds with the PDF as an
    // attachment, so the browser downloads it without navigating away.
    function downloadPdf(id) {
      if (!id) return;
      showToast("Downloading…");
      window.location.href = "/api/statements/" + encodeURIComponent(id) + "/pdf";
    }

    async function raiseIssue(id) {
      if (!id) return;
      // Let the user describe what's wrong; an empty note is allowed (just a flag).
      var note = window.prompt(
        "What's wrong with this statement? (optional — leave blank to just flag it)"
      );
      // prompt() returns null only when the user cancels.
      if (note === null) return;
      try {
        var res = await fetch("/api/statements/" + encodeURIComponent(id) + "/issue", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ note: note }),
        });
        if (res.ok) {
          showToast("Thanks — we'll look into this statement.");
        } else {
          var out = await res.json().catch(function () { return {}; });
          showToast(out.error || "Could not submit your report.");
        }
      } catch (e) {
        showToast("Could not reach the server.");
      }
    }

    async function viewStatement(id) {
      if (!id) return;
      showToast("Opening…");
      try {
        var res = await fetch("/api/statements/" + encodeURIComponent(id));
        var out = await res.json();
        if (!res.ok) {
          showToast(out.error || "Could not open this statement.");
          return;
        }
        sessionStorage.setItem("transactions", JSON.stringify({ headers: out.headers, data: out.data, page_count: out.page_count, statement_id: id }));
        sessionStorage.setItem("pdfName", String(out.filename || "statement").replace(/\.pdf$/i, ""));
        window.location.href = "/results.html";
      } catch (e) {
        showToast("Could not reach the server.");
      }
    }

    // ---- Load ----
    (async function init() {
      try {
        var meRes = await fetch("/api/me");
        var me = await meRes.json();
        if (!me.authenticated) { showAuthGate(); return; }
        // Reveal the Admin link only for admins (server still enforces access).
        if (me.is_admin) {
          var al = document.getElementById("adminLink");
          if (al) al.style.display = "";
        }

        var res = await fetch("/api/statements");
        if (res.status === 401) { showAuthGate(); return; }
        var out = await res.json();
        if (!res.ok) { showError(out.error || "Could not load your statements."); return; }

        var items = out.statements || [];
        if (!items.length) { showEmpty(); return; }
        renderList(items);
      } catch (e) {
        showError("Could not reach the server. Please try again.");
      }
    })();
  </script>

</body>
</html>
