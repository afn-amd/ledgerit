    function fixStatementsHeight() {
      var scroll = document.getElementById("stmtScroll");
      if (!scroll) return;
      var thead = scroll.querySelector("thead");
      var tbody = scroll.querySelector("tbody");
      if (!thead || !tbody) return;

      // Drop any filler rows from a previous pass before measuring.
      tbody.querySelectorAll("tr.filler").forEach(function (f) { f.remove(); });
      var trs = tbody.querySelectorAll("tr");

      if (!trs.length) { scroll.style.height = ""; return; }

      // Empty-state placeholder (single full-width cell): still reserve the full
      // 5-row height so the table (and charts below) stay put.
      var placeholder = trs.length === 1 && trs[0].querySelector("td[colspan]");
      if (placeholder) {
        var rh0 = stmtRowH || 56;
        trs[0].style.height = (rh0 * VISIBLE_ROWS) + "px";
        scroll.style.height = (thead.offsetHeight + rh0 * VISIBLE_ROWS + 1) + "px";
        return;
      }

      // Use one uniform row height for every row, kept as the tallest natural
      // row seen across renders so the table is the SAME size for every filter.
      var maxH = 0;
      trs.forEach(function (t) { if (t.offsetHeight > maxH) maxH = t.offsetHeight; });
      if (maxH > stmtRowH) stmtRowH = maxH;
      var rh = stmtRowH;
      trs.forEach(function (t) { t.style.height = rh + "px"; });

      // Pad with empty filler rows so the table always shows VISIBLE_ROWS rows,
      // keeping the area — and the charts below it — at a fixed position.
      var n = trs.length;
      if (n < VISIBLE_ROWS) {
        var html = "";
        for (var k = 0; k < VISIBLE_ROWS - n; k++) {
          html += '<tr class="filler" style="height:' + rh + 'px"><td colspan="7"></td></tr>';
        }
        tbody.insertAdjacentHTML("beforeend", html);
      }

      // Height = header + VISIBLE_ROWS uniform rows; any extra rows scroll within.
      scroll.style.height = (thead.offsetHeight + rh * VISIBLE_ROWS + 1) + "px";
    }

    var VISIBLE_ROWS = 5;     // rows shown before the table scrolls
    var stmtFilter = "all";   // status filter: all | success | failed | issue
    var selBank = null;       // cross-filter: selected bank (null = all)
    var selOwner = null;      // cross-filter: selected owner (null = all)
    var stmtData = [];
    var stmtRowH = 0;     // uniform row height, shared across all filters
    var stmtDirty = false; // statements changed elsewhere (e.g. issue resolved)

    function bankKey(s) { return (s.bank || "").trim(); }
    function ownerKey(s) { return (s.owner_name || s.owner_mobile || "Unknown").trim(); }
    function matchStatus(s) {
      // A resolved issue counts as success; only an OPEN issue is "issue raised".
      if (stmtFilter === "success") return s.status !== "failed" && s.issue_status !== "open";
      if (stmtFilter === "failed") return s.status === "failed";
      if (stmtFilter === "issue") return s.issue_status === "open";
      return true;
    }
    function matchBank(s) { return !selBank || bankKey(s) === selBank; }
    function matchOwner(s) { return !selOwner || ownerKey(s) === selOwner; }

    // Cross-filter render: the table reflects every active selection, while each
    // chart reflects the OTHER dimensions' selections (not its own) so you can
    // still see and re-pick within that chart.
    function renderAll() {
      renderStatements(stmtData.filter(function (s) { return matchStatus(s) && matchBank(s) && matchOwner(s); }));
      renderStmtChart(
        stmtData.filter(function (s) { return matchBank(s) && matchOwner(s); }),    // pie  — status excluded
        stmtData.filter(function (s) { return matchStatus(s) && matchOwner(s); }),  // banks — bank excluded
        stmtData.filter(function (s) { return matchStatus(s) && matchBank(s); })    // owners — owner excluded
      );
      syncChips();
    }
    function syncChips() {
      document.querySelectorAll("#stmtFilter button").forEach(function (b) {
        b.classList.toggle("active", b.getAttribute("data-f") === stmtFilter);
      });
    }
    // Clicking a selected item again clears that selection (toggle).
    function toggleBank(name) { selBank = (selBank === name ? null : name); renderAll(); }
    function toggleOwner(name) { selOwner = (selOwner === name ? null : name); renderAll(); }
    function toggleStatus(cat) { stmtFilter = (stmtFilter === cat ? "all" : cat); renderAll(); }

    // Re-render after an external change (issue resolved/reopened from Issues tab).
    function refreshStatements() {
      if (!loaded.statements) return;            // not built yet — fetched fresh on first open
      var panel = document.getElementById("panel-statements");
      if (panel && panel.classList.contains("active")) {
        renderAll();
        stmtDirty = false;
      } else {
        stmtDirty = true;                        // defer until the tab is shown
      }
    }
    tabs.statements = function () {
      var el = document.getElementById("panel-statements");
      el.innerHTML =
        '<div class="toolbar"><div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
          '<input id="stmtSearch" type="search" placeholder="Search by filename, bank or owner…" autocomplete="off"></div>' +
          '<div class="seg" id="stmtFilter">' +
            '<button data-f="all" class="active">All</button>' +
            '<button data-f="success">Success</button>' +
            '<button data-f="failed">Failed</button>' +
            '<button data-f="issue">Issue raised</button>' +
          '</div>' +
        '</div>' +
        '<div class="card"><div class="table-scroll scroll-y" id="stmtScroll"><table>' +
          '<thead><tr><th>File</th><th>Owner</th><th>Bank</th><th>Rows</th><th>Pages</th><th>Uploaded</th><th style="text-align:right;">Result</th></tr></thead>' +
          '<tbody><tr><td colspan="7" style="text-align:center;padding:34px;"><div class="spinner"></div></td></tr></tbody>' +
        '</table></div></div>' +
        '<div class="chart-wrap" id="stmtChart"></div>';
      var debounce = null;
      document.getElementById("stmtSearch").addEventListener("input", function (e) {
        clearTimeout(debounce); var q = e.target.value;
        debounce = setTimeout(function () { fetchStatements(q); }, 250);
      });
      el.querySelectorAll("#stmtFilter button").forEach(function (b) {
        b.addEventListener("click", function () {
          var f = b.getAttribute("data-f");
          // Re-clicking the active filter (other than All) clears back to All.
          stmtFilter = (f === stmtFilter && f !== "all") ? "all" : f;
          renderAll();
        });
      });
      fetchStatements("");
    };

    async function fetchStatements(q) {
      var r = await api("/api/admin/statements?q=" + encodeURIComponent(q || ""));
      if (!r.ok) { showToast(r.data.error || "Could not load statements."); return; }
      stmtData = r.data.statements || [];
      selBank = null; selOwner = null;   // new dataset → clear cross-filter selections
      renderAll();
    }

    // Pie + bank/owner bar lists, all cross-filter aware. Each receives its own
    // pre-filtered dataset (pie excludes the status selection, bank list the
    // bank selection, owner list the owner selection). Clicking a slice, legend
    // row, or bar toggles that dimension's selection (handled via data-* attrs).
    function renderStmtChart(pieData, bankData, ownerData) {
      var wrap = document.getElementById("stmtChart");
      if (!wrap) return;

      var failed = 0, issue = 0, success = 0;
      pieData.forEach(function (s) {
        if (s.status === "failed") failed++;
        else if (s.issue_status === "open") issue++;   // resolved counts as success
        else success++;
      });

      // Each slice: tinted fill with a full-opacity border in the same colour
      // (the solid filter-chip colours: green / red / orange). The legend
      // reuses the table's status icons (tick / cross / info).
      var ICON = {
        ok: '<span class="st-icon ok"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>',
        bad: '<span class="st-icon bad"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>',
        issue: '<span class="st-icon issue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="11" x2="12" y2="16"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></span>',
      };
      var segs = [
        { label: "Success", value: success, rgb: "22,163,74", cls: "ok", filter: "success" },
        { label: "Failed", value: failed, rgb: "220,38,38", cls: "bad", filter: "failed" },
        { label: "Issue raised", value: issue, rgb: "217,119,6", cls: "issue", filter: "issue" },
      ];
      var total = success + failed + issue;

      var R = 46, C = 50, GAP = 3;   // radius, centre, gap between slices (deg)
      function pt(angle) {
        var rad = (angle - 90) * Math.PI / 180;   // -90° → start at 12 o'clock
        return (C + R * Math.cos(rad)).toFixed(3) + " " + (C + R * Math.sin(rad)).toFixed(3);
      }
      // emphasise the selected status slice
      function alphaFor(f) { return (stmtFilter !== "all" && f === stmtFilter) ? 0.6 : 0.3; }

      var inner = "";
      if (total) {
        var active = segs.filter(function (s) { return s.value > 0; });
        if (active.length === 1) {
          var only = active[0];
          inner = '<circle class="pie-slice' + (stmtFilter === only.filter ? ' sel' : '') + '" data-status="' + only.filter +
                  '" cx="' + C + '" cy="' + C + '" r="' + R + '" fill="rgba(' + only.rgb + ',' + alphaFor(only.filter) +
                  ')" stroke="rgb(' + only.rgb + ')" stroke-width="0.6"/>';
        } else {
          var paths = "", acc = 0;
          active.forEach(function (sg) {
            var a0 = (acc / total) * 360;
            acc += sg.value;
            var a1 = (acc / total) * 360;
            var s = a0 + GAP / 2, e = a1 - GAP / 2;
            if (e < s) { s = a0; e = a1; }                 // safety for tiny slices
            var large = (e - s) > 180 ? 1 : 0;
            paths += '<path class="pie-slice' + (stmtFilter === sg.filter ? ' sel' : '') + '" data-status="' + sg.filter +
                     '" d="M ' + C + ' ' + C + ' L ' + pt(s) +
                     ' A ' + R + ' ' + R + ' 0 ' + large + ' 1 ' + pt(e) + ' Z" ' +
                     'fill="rgba(' + sg.rgb + ',' + alphaFor(sg.filter) + ')" stroke="rgb(' + sg.rgb +
                     ')" stroke-width="0.6" stroke-linejoin="round"/>';
          });
          inner = paths;
        }
      }

      var anySel = stmtFilter !== "all";
      var legend = segs.map(function (sg) {
        var pct = total ? Math.round((sg.value / total) * 100) : 0;
        var isSel = stmtFilter === sg.filter;
        var cls = "lg-item" + (isSel ? " sel" : (anySel ? " dim" : ""));
        return '<div class="' + cls + '" data-status="' + sg.filter + '" style="--seg:rgb(' + sg.rgb + ')">' +
               ICON[sg.cls] + '<span>' + sg.value + ' (' + pct + '%)</span></div>';
      }).join("");

      wrap.innerHTML =
        renderBankBars(bankData) +
        '<div class="chart-center"><div class="pie"><svg viewBox="0 0 100 100">' + inner + '</svg></div>' +
          '<div class="chart-legend">' + legend + '</div></div>' +
        '<div class="user-block">' + renderUserBars(ownerData) + '</div>';

      // wire cross-filter clicks
      wrap.querySelectorAll("[data-status]").forEach(function (el) {
        el.addEventListener("click", function () { toggleStatus(el.getAttribute("data-status")); });
      });
      wrap.querySelectorAll("[data-bank]").forEach(function (el) {
        el.addEventListener("click", function () { toggleBank(el.getAttribute("data-bank")); });
      });
      wrap.querySelectorAll("[data-owner]").forEach(function (el) {
        el.addEventListener("click", function () { toggleOwner(el.getAttribute("data-owner")); });
      });

      capBarLists();
    }

    // Cap each bar list so at least 5 rows are fully visible; if there are more,
    // leave a small peek of the 6th to signal that it scrolls. Measured from the
    // rendered rows so it's correct regardless of font metrics.
    function capBarLists() {
      document.querySelectorAll("#stmtChart .bank-list").forEach(function (list) {
        var rows = list.querySelectorAll(".bar-row");
        if (rows.length <= 5) { list.style.maxHeight = "none"; return; }   // show all, no scroll
        var h = 0;
        for (var i = 0; i < 5; i++) h += rows[i].offsetHeight;
        h += 4 * 4 + 12;   // 4 inter-row gaps + a peek of the 6th row
        list.style.maxHeight = h + "px";
      });
    }

    // Rank a {name: count} map: most first, ties broken alphabetically.
    function rankByCount(counts) {
      return Object.keys(counts).map(function (name) { return { name: name, count: counts[name] }; })
        .sort(function (a, b) {
          if (b.count !== a.count) return b.count - a.count;
          return a.name.toLowerCase().localeCompare(b.name.toLowerCase());
        });
    }

    // Shared ranked-bar-list markup. `attr` is the data-* used for click
    // selection; `selected` is the currently-selected name (highlighted).
    function barListHtml(items, selected, attr, emptyMsg) {
      if (!items.length) return '<div class="bank-list"><div class="cell-sub">' + emptyMsg + '</div></div>';
      var max = items[0].count;
      var rows = items.map(function (it) {
        var w = (it.count / max) * 100;
        return '<div class="bar-row' + (it.name === selected ? ' sel' : '') + '" ' + attr + '="' + escHtml(it.name) + '">' +
                 '<div class="bar-head">' +
                   '<span class="bar-name" title="' + escHtml(it.name) + '">' + escHtml(it.name) + '</span>' +
                   '<span class="bar-val">' + it.count + '</span>' +
                 '</div>' +
                 '<div class="bar-track"><div class="bar-fill" style="width:' + w.toFixed(1) + '%"></div></div>' +
               '</div>';
      }).join("");
      return '<div class="bank-list">' + rows + '</div>';
    }

    // Statements per bank (left of the pie). Statements with no bank are skipped.
    function renderBankBars(data) {
      var counts = {};
      data.forEach(function (s) { var b = bankKey(s); if (b) counts[b] = (counts[b] || 0) + 1; });
      return '<div class="bank-block">' + barListHtml(rankByCount(counts), selBank, "data-bank", "No bank data yet.") + '</div>';
    }

    // Statements per user (right of the pie).
    function renderUserBars(data) {
      var counts = {};
      data.forEach(function (s) { var n = ownerKey(s); counts[n] = (counts[n] || 0) + 1; });
      return barListHtml(rankByCount(counts), selOwner, "data-owner", "No user data yet.");
    }

    // =====================================================================
    // Messages
    // =====================================================================
    var msgFilter = "sales";   // source filter: "sales" (contact) | "general" (contactus)
    var msgData = [];
    var msgSalespeople = [];   // [{id, name}] for the assignment dropdown (super admin)
    var salesStatusFilter = "all";   // sales table: "all" | "open" | "purchased" | "not_purchased"
    var salesTypeFilter = "all";     // sales table: "all" | <org_type>
    var salesPersonFilter = "all";   // sales table: "all" | "__unassigned" | <salesperson>
    var salesRowH = 0;               // uniform sales-row height, shared across filters
    function renderMessages(list) {
      var el = document.getElementById("panel-messages").querySelector("#msgList");
      if (!list.length) {
        el.innerHTML = '<div class="card card-pad state"><div class="sic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><h2>No messages</h2><p>Nothing in this view yet.</p></div>';
        return;
      }
      el.innerHTML = list.map(function (m) {
        var who = (m.first_name || m.last_name) ? (m.first_name + " " + m.last_name).trim() : (m.org_name || "Anonymous");
        var contact = [m.email, m.phone].filter(Boolean).join(" · ");
        var resolved = m.status === "resolved";
        var subject = m.subject || (m.source === "contact" ? "Sales enquiry" : "Message");
        return '<div class="card feed-card' + (resolved ? ' resolved' : '') + '">' +
          '<div class="feed-top"><div><div class="feed-who">' + escHtml(who) +
            (m.org_type ? ' <span class="badge muted">' + escHtml(m.org_type) + '</span>' : '') + '</div>' +
            '<div class="feed-contact">' + escHtml(contact || "no contact details") + '</div></div>' +
            '<span class="badge ' + (resolved ? 'ok' : 'open') + '">' + (resolved ? 'Resolved' : 'Open') + '</span></div>' +
          '<div class="feed-subject">' + escHtml(subject) + '</div>' +
          (m.message ? '<div class="feed-body">' + escHtml(m.message) + '</div>' : '') +
          '<div class="feed-foot"><span class="feed-time">' + escHtml(fmtDateTime(m.created_at)) + ' · via ' + escHtml(m.source || "contact") + '</span>' +
            '<button class="btn" data-resolve="' + escHtml(m.id) + '" data-to="' + (resolved ? 'open' : 'resolved') + '">' + (resolved ? 'Reopen' : 'Mark resolved') + '</button></div>' +
        '</div>';
      }).join("");
      el.querySelectorAll("[data-resolve]").forEach(function (btn) {
        btn.addEventListener("click", function () { resolveMessage(btn.getAttribute("data-resolve"), btn.getAttribute("data-to") === "resolved"); });
      });
    }

    tabs.messages = function () {
      var el = document.getElementById("panel-messages");
      var role = window.currentRole;
      // Source scope by role: admins see general, salespeople see sales, the
      // super admin can switch between both.
      var toolbar = "";
      if (role === "admin") {
        msgFilter = "general";
      } else if (role === "salesperson") {
        msgFilter = "sales";
      } else {
        msgFilter = "sales";
        toolbar =
          '<div class="toolbar"><div class="seg" id="msgFilter">' +
            '<button data-f="sales" class="active">Sales</button><button data-f="general">General</button>' +
          '</div></div>';
      }
      el.innerHTML = toolbar +
        '<div class="feed" id="msgList"><div class="card card-pad state"><div class="spinner"></div></div></div>';
      el.querySelectorAll("#msgFilter button").forEach(function (b) {
        b.addEventListener("click", function () {
          el.querySelectorAll("#msgFilter button").forEach(function (x) { x.classList.remove("active"); });
          b.classList.add("active"); msgFilter = b.getAttribute("data-f"); applyMsgFilter();
        });
      });
      fetchMessages();
    };

    function applyMsgFilter() {
      // General = the contactus form; Sales = the contact (sales) form.
      var list = msgData.filter(function (m) {
        return msgFilter === "general" ? (m.source === "contactus") : (m.source !== "contactus");
      });
      if (msgFilter === "sales") renderSalesTable(list);
      else renderMessages(list);
    }

    // Donut of the sales status breakdown, with the legend in its centre.
    function buildStatusDonut(list) {
      var open = 0, purchased = 0, notp = 0;
      list.forEach(function (m) {
        if (m.status === "purchased") purchased++;
        else if (m.status === "not_purchased") notp++;
        else open++;
      });
      var total = open + purchased + notp;
      var segs = [
        { v: open, color: "#d97706", label: "Open", key: "open" },
        { v: purchased, color: "#16a34a", label: "Purchased", key: "purchased" },
        { v: notp, color: "#dc2626", label: "Not purchased", key: "not_purchased" },
      ];
      // r=15.915 → circumference ≈ 100, so a segment's % maps straight to the
      // dash length. Sequential offsets lay the slices end-to-end.
      var ring = '<circle cx="21" cy="21" r="15.915" fill="none" stroke="var(--track)" stroke-width="3.25"/>';
      var labels = "";
      if (total) {
        var acc = 0, accFrac = 0;
        segs.forEach(function (s) {
          if (!s.v) return;
          var frac = s.v / total;
          var pct = frac * 100;
          var active = salesStatusFilter === s.key;
          var da = pct.toFixed(2) + ' ' + (100 - pct).toFixed(2);
          var off = (-acc).toFixed(2);
          // Full-colour band — its exposed edges form the thin segment border.
          ring += '<circle cx="21" cy="21" r="15.915" fill="none" stroke="' + s.color + '" stroke-width="3.25" stroke-dasharray="' + da + '" stroke-dashoffset="' + off + '" data-statseg="' + s.key + '" style="cursor:pointer"/>';
          // Lighter interior for non-active segments (leaves a thin colour border);
          // the active one stays fully coloured (darkened).
          if (!active) {
            ring += '<circle cx="21" cy="21" r="15.915" fill="none" stroke="var(--surface)" stroke-width="2.1" stroke-dasharray="' + da + '" stroke-dashoffset="' + off + '" opacity="0.6" style="pointer-events:none"/>';
          }
          // percentage label, placed just outside the ring at the slice midpoint
          var ang = ((accFrac + frac / 2) * 360 - 90) * Math.PI / 180;
          var lr = 21.5;
          var x = 21 + lr * Math.cos(ang);
          var y = 21 + lr * Math.sin(ang);
          labels += '<text x="' + x.toFixed(2) + '" y="' + y.toFixed(2) + '" text-anchor="middle" dominant-baseline="central" font-size="3" font-weight="700" fill="' + s.color + '">' + Math.round(pct) + '%</text>';
          acc += pct; accFrac += frac;
        });
      }
      // Legend: colour circle + number only (no labels); clickable to filter.
      var legend = segs.map(function (s) {
        var dim = (salesStatusFilter !== "all" && s.key !== salesStatusFilter) ? ";opacity:0.4" : "";
        return '<div data-statseg="' + s.key + '" style="cursor:pointer' + dim + '"><span class="ld" style="background:' + s.color + '"></span><b>' + s.v + '</b></div>';
      }).join("");
      return '<div class="card donut-card"><div class="donut-wrap">' +
        '<svg class="donut" viewBox="-4 -4 50 50"><g transform="rotate(-90 21 21)">' + ring + '</g>' + labels + '</svg>' +
        '<div class="donut-legend">' + legend + '</div></div></div>';
    }

    // Ranked horizontal bars of sales enquiries by organisation type. Clicking a
    // bar filters the table (and the donut) to that type; clicking it again clears.
    function buildTypeBars(list) {
      var counts = {};
      list.forEach(function (m) { var t = (m.org_type || "").trim() || "—"; counts[t] = (counts[t] || 0) + 1; });
      var items = rankByCount(counts);
      var sel = salesTypeFilter === "all" ? null : salesTypeFilter;
      return '<div class="card typebars-card">' +
        barListHtml(items, sel, "data-typebar", "No sales enquiries yet.") + '</div>';
    }

    // Sales enquiries as a table with an editable salesperson and toggle status.
    function renderSalesTable(list) {
      var el = document.getElementById("msgList");
      // Always render the table (even with no/few rows) so it keeps its 5-row
      // height; the empty message shows inside it.
      // 3-state outcome chosen from a dropdown.
      var SALES_STATUS = {
        open:          { cls: "open" },
        purchased:     { cls: "ok" },
        not_purchased: { cls: "off" },
      };
      var isSuper = window.currentRole === "super_admin";
      // Unique org types for the Type dropdown; salespeople come from the
      // dedicated list (actual salesperson accounts).
      var typeSet = {};
      list.forEach(function (m) { var t = (m.org_type || "").trim(); if (t) typeSet[t] = true; });
      var types = Object.keys(typeSet).sort();
      var hasUnassigned = list.some(function (m) { return !m.salesperson_id; });

      // Status-dot + type + salesperson filters in the header.
      var filtered = list.filter(function (m) {
        var cur = SALES_STATUS[m.status] ? m.status : "open";
        if (salesStatusFilter !== "all" && cur !== salesStatusFilter) return false;
        if (salesTypeFilter !== "all" && (m.org_type || "") !== salesTypeFilter) return false;
        if (salesPersonFilter !== "all") {
          if (salesPersonFilter === "__unassigned" ? !!m.salesperson_id : m.salesperson_id !== salesPersonFilter) return false;
        }
        return true;
      });
      // For the donut: same type/salesperson scope but ALL statuses (so it
      // always shows the full Open/Purchased/Not-purchased breakdown).
      var donutList = list.filter(function (m) {
        if (salesTypeFilter !== "all" && (m.org_type || "") !== salesTypeFilter) return false;
        if (salesPersonFilter !== "all") {
          if (salesPersonFilter === "__unassigned" ? !!m.salesperson_id : m.salesperson_id !== salesPersonFilter) return false;
        }
        return true;
      });
      // For the type bars: reflect the OTHER filters (status + salesperson) but
      // NOT type itself, so every type stays visible and re-selectable.
      var typeScope = list.filter(function (m) {
        var cur = SALES_STATUS[m.status] ? m.status : "open";
        if (salesStatusFilter !== "all" && cur !== salesStatusFilter) return false;
        if (salesPersonFilter !== "all") {
          if (salesPersonFilter === "__unassigned" ? !!m.salesperson_id : m.salesperson_id !== salesPersonFilter) return false;
        }
        return true;
      });

      function dot(sf, cls) {
        return '<button type="button" class="st-dot st-' + cls + (salesStatusFilter === sf ? ' active' : '') + '" data-sf="' + sf + '"></button>';
      }
      var statusHead = 'Status <span class="st-filter">' +
        dot("open", "open") + dot("purchased", "ok") + dot("not_purchased", "off") + '</span>';

      // Type column header with a dropdown filter.
      var CHEV = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
      function typeOpt(val, label) {
        return '<button type="button" class="type-opt' + (salesTypeFilter === val ? ' active' : '') + '" data-type="' + escHtml(val) + '">' + escHtml(label) + '</button>';
      }
      var typeMenu = '<div class="type-menu" id="typeMenu" hidden>' +
        typeOpt("all", "All types") +
        types.map(function (t) { return typeOpt(t, t); }).join("") +
        '</div>';
      var typeHead = 'Type <span class="th-filter"><button type="button" class="th-arrow' + (salesTypeFilter !== "all" ? " on" : "") + '" id="typeBtn">' + CHEV + '</button>' + typeMenu + '</span>';

      // Salesperson column header. Super admin gets a dropdown filter over the
      // real salesperson accounts; other roles just see the label.
      function spOpt(val, label) {
        return '<button type="button" class="type-opt' + (salesPersonFilter === val ? ' active' : '') + '" data-spf="' + escHtml(val) + '">' + escHtml(label) + '</button>';
      }
      var spHead = 'Salesperson';
      if (isSuper) {
        var spMenu = '<div class="type-menu" id="spMenu" hidden>' +
          spOpt("all", "All salespeople") +
          msgSalespeople.map(function (p) { return spOpt(p.id, p.name); }).join("") +
          (hasUnassigned ? spOpt("__unassigned", "Unassigned") : "") +
          '</div>';
        spHead = 'Salesperson <span class="th-filter"><button type="button" class="th-arrow' + (salesPersonFilter !== "all" ? " on" : "") + '" id="spBtn">' + CHEV + '</button>' + spMenu + '</span>';
      }

      var rows = filtered.map(function (m) {
        var name = ((m.first_name || "") + " " + (m.last_name || "")).trim() || "—";
        var cur = SALES_STATUS[m.status] ? m.status : "open";
        var cls = SALES_STATUS[cur].cls;
        // Colour-only status: a circle in the current state's colour; clicking
        // opens a small picker to change it.
        var statusBadge = '<button type="button" class="status-dot-btn st-' + cls + '" data-statbtn="' + escHtml(m.id) + '"></button>';
        var spCell;
        if (isSuper) {
          spCell = '<select class="role-select" data-spassign="' + escHtml(m.id) + '">' +
            '<option value="">— Unassigned —</option>' +
            msgSalespeople.map(function (p) {
              return '<option value="' + escHtml(p.id) + '"' + (m.salesperson_id === p.id ? " selected" : "") + '>' + escHtml(p.name) + '</option>';
            }).join("") +
          '</select>';
        } else {
          spCell = '<span>' + escHtml(m.salesperson_name || "—") + '</span>';
        }
        return '<tr>' +
          '<td class="cell-strong">' + escHtml(name) + '</td>' +
          '<td><div>' + escHtml(m.email || "—") + '</div><div class="cell-sub">' + escHtml(m.phone || "—") + '</div></td>' +
          '<td>' + escHtml(m.org_name || "—") + '</td>' +
          '<td>' + escHtml(m.org_type || "—") + '</td>' +
          '<td><div>' + escHtml(fmtDate(m.created_at)) + '</div>' +
            '<div class="cell-sub">' + (m.decided_at ? escHtml(fmtDate(m.decided_at)) : "—") + '</div></td>' +
          '<td>' + spCell + '</td>' +
          '<td>' + statusBadge + '</td>' +
        '</tr>';
      }).join("");
      var emptyMsg = list.length ? "No enquiries match the filters." : "No sales enquiries yet.";
      var bodyHtml = rows || '<tr class="empty-row"><td colspan="7" class="cell-sub" style="text-align:center;padding:30px;">' + emptyMsg + '</td></tr>';
      el.innerHTML = '<div class="card"><div class="table-scroll scroll-y" id="salesScroll"><table class="sales-table">' +
        '<colgroup><col style="width:14%"><col style="width:19%"><col style="width:16%"><col style="width:12%"><col style="width:11%"><col style="width:16%"><col style="width:12%"></colgroup>' +
        '<thead><tr><th>Name</th><th>Email / Number</th><th>Organisation</th><th>' + typeHead + '</th><th>Date</th><th>' + spHead + '</th><th>' + statusHead + '</th></tr></thead>' +
        '<tbody>' + bodyHtml + '</tbody></table></div></div>' +
        '<div class="sales-chart">' + buildTypeBars(typeScope) + buildStatusDonut(donutList) + '</div>';

      fixSalesHeight();
      if (!window.__salesResize) {
        window.__salesResize = true;
        window.addEventListener("resize", function () { fixSalesHeight(); });
      }

      el.querySelectorAll("[data-typebar]").forEach(function (b) {
        b.addEventListener("click", function () {
          var t = b.getAttribute("data-typebar");
          salesTypeFilter = (salesTypeFilter === t) ? "all" : t;
          applyMsgFilter();
        });
      });
      // Donut slices & legend filter by status (same as the header dots).
      el.querySelectorAll("[data-statseg]").forEach(function (e) {
        e.addEventListener("click", function () {
          var k = e.getAttribute("data-statseg");
          salesStatusFilter = (salesStatusFilter === k) ? "all" : k;
          applyMsgFilter();
        });
      });
      el.querySelectorAll("[data-spassign]").forEach(function (sel) {
        sel.addEventListener("change", function () { setSalesperson(sel.getAttribute("data-spassign"), sel.value); });
      });
      el.querySelectorAll("[data-statbtn]").forEach(function (b) {
        b.addEventListener("click", function (e) { e.stopPropagation(); openStatusPicker(b, b.getAttribute("data-statbtn")); });
      });
      // Header status-dot filters — clicking the active one clears back to all.
      el.querySelectorAll("[data-sf]").forEach(function (d) {
        d.addEventListener("click", function () {
          var sf = d.getAttribute("data-sf");
          salesStatusFilter = (salesStatusFilter === sf) ? "all" : sf;
          applyMsgFilter();
        });
      });

      // Header dropdown filters (positioned fixed so the scroll container can't
      // clip them). Opening one closes the other.
      function wireMenu(btnId, menuId) {
        var btn = document.getElementById(btnId), menu = document.getElementById(menuId);
        if (!btn || !menu) return;
        btn.addEventListener("click", function (e) {
          e.stopPropagation();
          var willOpen = menu.hidden;
          el.querySelectorAll(".type-menu").forEach(function (mm) { mm.hidden = true; });
          if (willOpen) {
            var rect = btn.getBoundingClientRect();
            var left = Math.min(rect.left, window.innerWidth - 168 - 8);
            menu.style.top = (rect.bottom + 6) + "px";
            menu.style.left = Math.max(8, left) + "px";
            menu.hidden = false;
          }
        });
      }
      wireMenu("typeBtn", "typeMenu");
      wireMenu("spBtn", "spMenu");

      el.querySelectorAll("[data-type]").forEach(function (o) {
        o.addEventListener("click", function () { salesTypeFilter = o.getAttribute("data-type"); applyMsgFilter(); });
      });
      el.querySelectorAll("[data-spf]").forEach(function (o) {
        o.addEventListener("click", function () { salesPersonFilter = o.getAttribute("data-spf"); applyMsgFilter(); });
      });

      // Close any open header menu on an outside click (attached once).
      if (!window.__headerMenuClose) {
        window.__headerMenuClose = true;
        document.addEventListener("click", function (ev) {
          if (ev.target.closest && (ev.target.closest(".type-menu") || ev.target.closest(".th-arrow"))) return;
          document.querySelectorAll(".type-menu").forEach(function (m) { m.hidden = true; });
        });
      }
    }

    // The sales table always reserves exactly 5 rows of space — padding with
    // empty filler rows when there's less data, scrolling when there's more.
    function fixSalesHeight() {
      var scroll = document.getElementById("salesScroll");
      if (!scroll) return;
      var thead = scroll.querySelector("thead");
      var tbody = scroll.querySelector("tbody");
      if (!thead || !tbody) return;

      tbody.querySelectorAll("tr.filler").forEach(function (f) { f.remove(); });
      var trs = tbody.querySelectorAll("tr");
      var empty = trs.length === 1 && trs[0].querySelector("td[colspan]");
      var rh;

      if (empty) {
        // No matching rows — let the message fill the whole 5-row space.
        rh = salesRowH || 56;
        trs[0].style.height = (rh * 5) + "px";
      } else {
        // Uniform row height = tallest natural row (kept across renders so the
        // table is the same size for every filter).
        var maxH = 0;
        trs.forEach(function (t) { t.style.height = ""; if (t.offsetHeight > maxH) maxH = t.offsetHeight; });
        if (maxH > salesRowH) salesRowH = maxH;
        rh = salesRowH || 56;
        trs.forEach(function (t) { t.style.height = rh + "px"; });
        // Pad with empty filler rows to always fill 5 row slots.
        if (trs.length < 5) {
          var html = "";
          for (var k = 0; k < 5 - trs.length; k++) {
            html += '<tr class="filler" style="height:' + rh + 'px"><td colspan="7"></td></tr>';
          }
          tbody.insertAdjacentHTML("beforeend", html);
        }
      }

      // Fixed height = header + 5 rows; extra data rows scroll within.
      scroll.style.height = (thead.offsetHeight + rh * 5 + 2) + "px";
      scroll.style.maxHeight = "";
    }


    async function setSalesStatus(id, status) {
      var r = await api("/api/admin/messages/" + encodeURIComponent(id) + "/status", {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ status: status }),
      });
      if (!r.ok) { showToast(r.data.error || "Could not update status."); return; }
      var m = msgData.find(function (x) { return x.id === id; });
      if (m) {
        m.status = status;
        m.decided_at = status === "open" ? null : new Date().toISOString();
      }
      applyMsgFilter();
      setNotif("nMessages", openMsgCount());
    }

    function openMsgCount() {
      return msgData.filter(function (m) {
        return ["resolved", "purchased", "not_purchased"].indexOf(m.status) === -1;
      }).length;
    }

    // Small colour picker for a sales enquiry's status (no text — just dots).
    function closeStatusPicker() {
      var m = document.getElementById("statPicker");
      if (m) m.remove();
    }
    function openStatusPicker(btn, msgId) {
      closeStatusPicker();
      var opts = [["open", "st-open", "Open"], ["purchased", "st-ok", "Purchased"], ["not_purchased", "st-off", "Not Purchased"]];
      var menu = document.createElement("div");
      menu.id = "statPicker";
      menu.className = "stat-menu";
      menu.innerHTML = opts.map(function (o) {
        return '<button type="button" class="stat-opt" data-set="' + o[0] + '" data-tip="' + o[2] + '"><span class="st-dot ' + o[1] + '"></span></button>';
      }).join("");
      document.body.appendChild(menu);
      var rect = btn.getBoundingClientRect();
      menu.style.top = (rect.bottom + 6) + "px";
      menu.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - 130)) + "px";
      menu.querySelectorAll("[data-set]").forEach(function (o) {
        o.addEventListener("click", function (e) {
          e.stopPropagation();
          setSalesStatus(msgId, o.getAttribute("data-set"));
          closeStatusPicker();
        });
      });
      if (!window.__statPickerClose) {
        window.__statPickerClose = true;
        document.addEventListener("click", function (ev) {
          var p = document.getElementById("statPicker");
          if (p && !p.contains(ev.target)) closeStatusPicker();
        });
      }
    }

    async function setSalesperson(id, salespersonId) {
      var r = await api("/api/admin/messages/" + encodeURIComponent(id) + "/salesperson", {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ salesperson_id: salespersonId }),
      });
      if (!r.ok) { showToast(r.data.error || "Could not assign salesperson."); applyMsgFilter(); return; }
      var m = msgData.find(function (x) { return x.id === id; });
      if (m) {
        var p = msgSalespeople.find(function (x) { return x.id === salespersonId; });
        m.salesperson_id = salespersonId;
        m.salesperson_name = p ? p.name : "";
      }
      showToast(salespersonId ? "Salesperson assigned." : "Unassigned.");
      applyMsgFilter();
    }

    async function fetchMessages() {
      var r = await api("/api/admin/messages");
      if (!r.ok) { showToast(r.data.error || "Could not load messages."); return; }
      msgData = r.data.messages || [];
      msgSalespeople = r.data.salespeople || [];
      applyMsgFilter();
      setNotif("nMessages", openMsgCount());
    }

    async function resolveMessage(id, resolved) {
      var r = await api("/api/admin/messages/" + encodeURIComponent(id) + "/resolve", {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ resolved: resolved }),
      });
      if (!r.ok) { showToast(r.data.error || "Could not update message."); return; }
      showToast(resolved ? "Marked resolved." : "Reopened.");
      fetchMessages();
    }

    // =====================================================================
    // Issues
    // =====================================================================
    function renderIssues(list) {
      var el = document.getElementById("issuesList");
      if (!list.length) {
        el.innerHTML = '<div class="card card-pad state"><div class="sic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><h2>No issues here</h2><p>Nothing matches this view.</p></div>';
        return;
      }
      el.innerHTML = '<div class="feed">' + list.map(function (i) {
        var resolved = i.status === "resolved";
        var owner = i.owner_name || i.owner_mobile || "Unknown";
        var raisedBy = "Raised by " + escHtml(owner) + (i.owner_mobile && i.owner_name ? " | " + escHtml(i.owner_mobile) : "");
        return '<div class="card feed-card' + (resolved ? ' resolved' : '') + '">' +
          '<div class="feed-top"><div><div class="feed-who">' + escHtml(i.filename || "Untitled statement") + '</div>' +
            '<div class="feed-contact">' + raisedBy + (i.owner_deleted ? ' <span class="badge off">deleted</span>' : '') + '</div></div>' +
            '<span class="badge ' + (resolved ? 'ok' : 'open') + '">' + (resolved ? 'Resolved' : 'Open') + '</span></div>' +
          '<div class="feed-body" style="margin-top:12px;' + (i.note ? 'color:var(--t-red-fg);font-weight:500;' : '') + '">' + escHtml(i.note || "(no description provided)") + '</div>' +
          '<div class="feed-foot"><span class="feed-time">' + escHtml(fmtDateTime(i.created_at)) + '</span>' +
            '<div style="display:flex;gap:8px;">' +
              '<button class="btn btn-primary" data-result="' + escHtml(i.statement_id) + '">View result</button>' +
              '<a class="btn" href="/api/admin/statements/' + escHtml(i.statement_id) + '/pdf?inline=1" target="_blank" rel="noopener">View PDF</a>' +
              '<button class="btn" data-resolve="' + escHtml(i.statement_id) + '" data-to="' + (resolved ? 'open' : 'resolved') + '">' + (resolved ? 'Reopen' : 'Mark resolved') + '</button>' +
            '</div></div>' +
        '</div>';
      }).join("") + '</div>';
      el.querySelectorAll("[data-result]").forEach(function (btn) {
        btn.addEventListener("click", function () { viewResult(btn.getAttribute("data-result")); });
      });
      el.querySelectorAll("[data-resolve]").forEach(function (btn) {
        btn.addEventListener("click", function () { resolveIssue(btn.getAttribute("data-resolve"), btn.getAttribute("data-to") === "resolved"); });
      });
    }

    // Open a statement's extracted result in results.html. Loads the full data
    // via the admin endpoint and hands it off through sessionStorage, the same
    // contract results.html reads. statement_id is intentionally omitted so the
    // result page's owner-scoped "View PDF" button stays hidden (admins use the
    // View PDF button here instead).
    async function viewResult(id) {
      if (!id) return;
      showToast("Opening…");
      var r = await api("/api/admin/statements/" + encodeURIComponent(id));
      if (!r.ok) { showToast(r.data.error || "Could not open the result."); return; }
      try {
        sessionStorage.setItem("transactions", JSON.stringify({
          headers: r.data.headers, data: r.data.data, page_count: r.data.page_count,
        }));
        sessionStorage.setItem("pdfName", String(r.data.filename || "statement").replace(/\.pdf$/i, ""));
      } catch (e) {}
      window.location.href = "/results.html";
    }

    var issueFilter = "open";
    var issuesData = [];
    tabs.issues = function () {
      var el = document.getElementById("panel-issues");
      el.innerHTML =
        '<div class="toolbar"><div class="seg" id="issueFilter">' +
          '<button data-f="open" class="active">Open</button>' +
          '<button data-f="resolved">Resolved</button>' +
        '</div></div>' +
        '<div id="issuesList"><div class="card card-pad state"><div class="spinner"></div></div></div>';
      el.querySelectorAll("#issueFilter button").forEach(function (b) {
        b.addEventListener("click", function () {
          el.querySelectorAll("#issueFilter button").forEach(function (x) { x.classList.remove("active"); });
          b.classList.add("active");
          issueFilter = b.getAttribute("data-f");
          applyIssueFilter();
        });
      });
      fetchIssues();
    };

    function applyIssueFilter() {
      var list = issuesData.filter(function (i) {
        if (issueFilter === "open") return i.status !== "resolved";
        if (issueFilter === "resolved") return i.status === "resolved";
        return true;
      });
      renderIssues(list);
    }

    async function fetchIssues() {
      var r = await api("/api/admin/issues");
      if (!r.ok) { showToast(r.data.error || "Could not load issues."); return; }
      issuesData = r.data.issues || [];
      applyIssueFilter();
      setNotif("nIssues", issuesData.filter(function (i) { return i.status !== "resolved"; }).length);
    }

    async function resolveIssue(id, resolved) {
      var r = await api("/api/admin/statements/" + encodeURIComponent(id) + "/issue/resolve", {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ resolved: resolved }),
      });
      if (!r.ok) { showToast(r.data.error || "Could not update issue."); return; }
      showToast(resolved ? "Issue resolved." : "Issue reopened.");

      // Reflect the new state in the Statements view immediately: a resolved
      // issue becomes a success (moves out of "Issue raised"), and reopening
      // moves it back — no page refresh needed.
      for (var i = 0; i < stmtData.length; i++) {
        if (stmtData[i].id === id) { stmtData[i].issue_status = resolved ? "resolved" : "open"; break; }
      }
      refreshStatements();

      fetchIssues();
    }

    // =====================================================================
    // Init
    // =====================================================================
    // Which sections each role may use, and where it lands by default.
    var ROLE_SECTIONS = {
      super_admin: ["dashboard", "users", "statements", "messages", "issues"],
      admin:       ["dashboard", "statements", "issues", "messages"],
      salesperson: ["messages"],
    };

    (async function init() {
      var r = await api("/api/me");
      if (!r.data.authenticated) { showGate(true); return; }
      if (!r.data.is_admin) { showGate(false); return; }

      window.currentRole = r.data.role || "admin";
      var allowed = ROLE_SECTIONS[window.currentRole] || ["messages"];
      window.allowedSections = allowed;

      document.getElementById("gate").style.display = "none";
      document.getElementById("shell").style.display = "flex";
      var wn = document.getElementById("whoName");
      if (r.data.name && wn) wn.textContent = r.data.name;

      // Show only the nav items this role is allowed to open.
      document.querySelectorAll(".nav-opt[data-tab]").forEach(function (t) {
        var name = t.getAttribute("data-tab");
        if (allowed.indexOf(name) === -1) { t.style.display = "none"; return; }
        t.addEventListener("click", function () { activateTab(name); });
      });

      // Land on the role's first allowed section (activateTab loads its data).
      activateTab(allowed[0]);
    })();
  </script>

</body>
</html>
