<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#ffffff" />
  <script>
    /* set theme before paint to avoid a flash */
    (function () {
      try {
        var s = localStorage.getItem("theme");
        var t = s || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", t);
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute("content", t === "dark" ? "#030712" : "#ffffff");
      } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
    })();
  </script>
  <title>Admin — Ledgerit</title>

  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* Palette mirrors the Tailwind gray/blue scale used in the reference. */
    :root {
      --bg: #f9fafb;            /* gray-50  */
      --surface: #ffffff;
      --sidebar: #ffffff;
      --border: #e5e7eb;        /* gray-200 */
      --ink: #111827;           /* gray-900 */
      --ink-soft: #374151;      /* gray-700 */
      --muted: #4b5563;         /* gray-600 */
      --muted-2: #6b7280;       /* gray-500 */
      --hover: #f9fafb;
      --hover-strong: #e8edf4;  /* clearer hover for interactive chart bars/legend */
      --accent: #3b82f6;        /* blue-500 */
      --accent-strong: #2563eb; /* blue-600 */
      --accent-text: #1d4ed8;   /* blue-700 */
      --sel-bg: #eff6ff;        /* blue-50  */
      --sel-text: #1d4ed8;
      --green: #16a34a; --green-text: #15803d;
      --track: #e5e7eb;
      --shadow-sm: 0 1px 2px rgba(16,24,40,0.05);
      --shadow: 0 8px 24px rgba(16,24,40,0.08);
      --shadow-lg: 0 24px 60px rgba(16,24,40,0.16);
      /* tile accents: icon-bg / icon-fg */
      --t-blue-bg: #eff6ff;   --t-blue-fg: #2563eb;
      --t-purple-bg: #faf5ff; --t-purple-fg: #9333ea;
      --t-amber-bg: #fff7ed;  --t-amber-fg: #ea580c;
      --t-red-bg: #fef2f2;    --t-red-fg: #dc2626;
      --t-green-bg: #f0fdf4;  --t-green-fg: #16a34a;
      --danger-bg: #fef2f2; --danger-fg: #dc2626;
      --ok-bg: #f0fdf4; --ok-fg: #16a34a;
      --open-bg: #fff7ed; --open-fg: #c2410c;
    }
    :root[data-theme="dark"] {
      --bg: #030712;            /* gray-950 */
      --surface: #111827;       /* gray-900 */
      --sidebar: #111827;
      --border: #1f2937;        /* gray-800 */
      --ink: #f3f4f6;           /* gray-100 */
      --ink-soft: #d1d5db;      /* gray-300 */
      --muted: #9ca3af;         /* gray-400 */
      --muted-2: #9ca3af;
      --hover: #1f2937;
      --hover-strong: #1f2937;  /* dark hover is already clear — keep as-is */
      --accent: #3b82f6;
      --accent-strong: #2563eb;
      --accent-text: #93c5fd;
      --sel-bg: rgba(30,58,138,0.5);   /* blue-900/50 */
      --sel-text: #93c5fd;             /* blue-300 */
      --green: #22c55e; --green-text: #4ade80;
      --track: #374151;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
      --shadow: 0 10px 30px rgba(0,0,0,0.5);
      --shadow-lg: 0 24px 60px rgba(0,0,0,0.6);
      --t-blue-bg: rgba(30,58,138,0.2);   --t-blue-fg: #60a5fa;
      --t-purple-bg: rgba(88,28,135,0.2); --t-purple-fg: #c084fc;
      --t-amber-bg: rgba(124,45,18,0.2);  --t-amber-fg: #fb923c;
      --t-red-bg: rgba(127,29,29,0.2);    --t-red-fg: #f87171;
      --t-green-bg: rgba(20,83,45,0.2);   --t-green-fg: #4ade80;
      --danger-bg: rgba(127,29,29,0.25); --danger-fg: #f87171;
      --ok-bg: rgba(20,83,45,0.25); --ok-fg: #4ade80;
      --open-bg: rgba(124,45,18,0.25); --open-fg: #fb923c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg); color: var(--ink);
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.2s ease, color 0.2s ease;
      height: 100vh; overflow: hidden;   /* the page itself never scrolls */
    }
    a { text-decoration: none; color: inherit; }
    .shell { display: flex; height: 100vh; width: 100%; overflow: hidden; }
    svg { display: block; }

    /* ===================== Sidebar ===================== */
    .sidebar {
      position: sticky; top: 0; height: 100vh; flex-shrink: 0;
      width: 256px; border-right: 1px solid var(--border);
      background: var(--sidebar); padding: 8px;
      display: flex; flex-direction: column;
      transition: width 0.3s ease; box-shadow: var(--shadow-sm);
    }
    .sidebar.collapsed { width: 64px; }

    .side-top { margin-bottom: 18px; border-bottom: 1px solid var(--border); padding-bottom: 14px; }
    .side-brand {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 8px; border-radius: 8px;
    }
    .brand-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand-logo {
      width: 40px; height: 40px; flex-shrink: 0; border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      display: grid; place-content: center; box-shadow: var(--shadow-sm);
    }
    .brand-logo svg { width: 20px; height: 20px; color: #fff; }
    .brand-logo img { width: 24px; height: 24px; object-fit: contain; display: block; }
    .brand-meta { min-width: 0; }
    .brand-meta .t { display: block; font-size: 0.875rem; font-weight: 600; color: var(--ink); white-space: nowrap; }
    .brand-meta .s { display: block; font-size: 0.75rem; color: var(--muted-2); white-space: nowrap; }

    .side-nav { display: flex; flex-direction: column; gap: 4px; }
    .side-label {
      padding: 8px 12px 4px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--muted-2);
    }
    .side-sep { border-top: 1px solid var(--border); margin: 12px 0 6px; }

    .nav-opt {
      position: relative; display: flex; align-items: center; height: 44px; width: 100%;
      border: none; background: none; cursor: pointer; border-radius: 8px;
      color: var(--muted); transition: background 0.18s ease, color 0.18s ease;
      font-family: inherit; text-align: left;
    }
    .nav-opt:hover { background: var(--hover); color: var(--ink); }
    .nav-opt.active { background: var(--sel-bg); color: var(--sel-text); box-shadow: var(--shadow-sm); }
    .nav-opt.active::before {
      content: ""; position: absolute; left: 0; top: 8px; bottom: 8px; width: 2px;
      background: var(--accent); border-radius: 2px;
    }
    .nav-opt .ic { display: grid; place-content: center; height: 100%; width: 48px; flex-shrink: 0; }
    .nav-opt .ic svg { width: 18px; height: 18px; }
    .nav-opt .lbl { font-size: 0.875rem; font-weight: 500; white-space: nowrap; }

    /* notification badge — pops up beside Messages / Issues when items are pending */
    .nav-opt .notif {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px;
      background: #ef4444; color: #fff; font-size: 0.68rem; font-weight: 700;
      line-height: 1; display: inline-grid; place-content: center;
      animation: notifPop 0.2s ease, notifPulse 2.2s ease-in-out infinite 0.2s;
    }
    .nav-opt .notif[hidden] { display: none; }
    @keyframes notifPop { from { transform: translateY(-50%) scale(0); } to { transform: translateY(-50%) scale(1); } }
    @keyframes notifPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
      50% { box-shadow: 0 0 0 5px rgba(239, 68, 68, 0); }
    }
    /* collapsed sidebar: shrink the badge to a dot on the icon corner */
    .sidebar.collapsed .nav-opt .notif {
      right: 9px; top: 7px; transform: none; animation: none;
      min-width: 9px; width: 9px; height: 9px; padding: 0; font-size: 0;
      border: 2px solid var(--sidebar);
    }

    .sidebar.collapsed .lbl,
    .sidebar.collapsed .brand-meta,
    .sidebar.collapsed .side-label,
    .sidebar.collapsed .side-theme { display: none; }
    .sidebar.collapsed .side-brand { justify-content: center; }

    .side-toggle {
      margin-top: auto; display: flex; align-items: center; width: 100%;
      border: none; border-top: 1px solid var(--border); background: none; cursor: pointer;
      color: var(--muted); transition: background 0.18s ease; border-radius: 0 0 8px 8px;
      font-family: inherit;
    }
    .side-toggle:hover { background: var(--hover); }
    .side-toggle .ic { display: grid; place-content: center; height: 44px; width: 48px; flex-shrink: 0; }
    .side-toggle .ic svg { width: 18px; height: 18px; transition: transform 0.3s ease; }
    .sidebar.collapsed .side-toggle .ic svg { transform: rotate(180deg); }
    .side-toggle .lbl { font-size: 0.875rem; font-weight: 500; }

    /* ===================== Main ===================== */
    .main { flex: 1; background: var(--bg); padding: 24px; overflow: auto; min-width: 0; min-height: 0; height: 100vh; }

    .icon-btn {
      display: grid; place-content: center; height: 40px; width: 40px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--surface); color: var(--muted);
      cursor: pointer; transition: color 0.18s ease, background 0.18s ease;
    }
    .icon-btn:hover { color: var(--ink); background: var(--hover); }
    .icon-btn svg { width: 18px; height: 18px; }
    .who {
      display: flex; align-items: center; gap: 8px; padding: 0 12px; height: 40px;
      border: 1px solid var(--border); border-radius: 10px; background: var(--surface);
      font-size: 0.88rem; font-weight: 600; color: var(--ink); white-space: nowrap;
    }
    .who svg { width: 16px; height: 16px; color: var(--muted); }

    /* tiles */
    .tile-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
    @media (max-width: 1024px) { .tile-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .tile-grid { grid-template-columns: 1fr; } }
    .tile {
      padding: 22px; border-radius: 14px; border: 1px solid var(--border);
      background: var(--surface); box-shadow: var(--shadow-sm); transition: box-shadow 0.18s ease;
    }
    .tile[data-nav] { cursor: pointer; }
    .tile:hover { box-shadow: var(--shadow); transform: translateY(-2px); border-color: var(--accent); }
    .tile[data-nav]:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .tile-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .tile-ic { padding: 9px; border-radius: 10px; display: grid; place-content: center; }
    .tile-ic svg { width: 20px; height: 20px; }
    .tile-blue .tile-ic { background: var(--t-blue-bg); color: var(--t-blue-fg); }
    .tile-purple .tile-ic { background: var(--t-purple-bg); color: var(--t-purple-fg); }
    .tile-amber .tile-ic { background: var(--t-amber-bg); color: var(--t-amber-fg); }
    .tile-red .tile-ic { background: var(--t-red-bg); color: var(--t-red-fg); }
    .tile h3 { font-size: 0.9rem; font-weight: 500; color: var(--muted); margin-bottom: 4px; }
    .tile .val { font-size: 1.6rem; font-weight: 700; color: var(--ink); }
    .tile .sub { font-size: 0.82rem; color: var(--muted-2); margin-top: 4px; }
    .tile .sub.attn { color: var(--t-red-fg); font-weight: 600; }

    /* cards / panels */
    .card { border-radius: 14px; border: 1px solid var(--border); background: var(--surface); box-shadow: var(--shadow-sm); }
    .card-pad { padding: 22px; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* dashboard lower row — anchors the usage card to the right */
    .dash-lower { display: flex; justify-content: flex-end; margin-top: 24px; }
    .usage-card { width: 100%; max-width: 340px; }
    .usage-title { font-size: 1.1rem; font-weight: 700; color: var(--ink); margin-bottom: 20px; }
    .usage-list { display: flex; flex-direction: column; gap: 18px; }
    .usage-item { min-width: 0; }
    .usage-top { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 8px; }
    .usage-top .nm { color: var(--ink-soft); font-size: 0.92rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .usage-top .pct { flex-shrink: 0; font-weight: 600; color: var(--ink); font-size: 0.92rem; font-variant-numeric: tabular-nums; }
    .meter { width: 100%; height: 8px; border-radius: 999px; background: var(--track); overflow: hidden; }
    .meter > i { display: block; height: 100%; border-radius: 999px; }
    .usage-empty { color: var(--muted-2); font-size: 0.88rem; padding: 6px 0; }

    /* toolbar / search */
    .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
    .search {
      flex: 1; min-width: 220px; display: flex; align-items: center; gap: 9px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0 14px;
    }
    .search:focus-within { border-color: var(--accent); }
    .search svg { width: 18px; height: 18px; color: var(--muted-2); flex-shrink: 0; }
    .search input {
      flex: 1; border: none; background: none; outline: none; color: var(--ink);
      font-family: inherit; font-size: 0.92rem; padding: 11px 0;
    }
    .seg { display: inline-flex; gap: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 3px; }
    .seg button {
      font-family: inherit; font-weight: 500; font-size: 0.85rem; color: var(--muted);
      background: none; border: none; cursor: pointer; padding: 7px 14px; border-radius: 8px;
    }
    .seg button.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }
    /* statements filter: soft tinted chips with coloured text; the selected one
       fills with its solid (opaque) colour. 'All' is white by default. */
    #stmtFilter button { background: var(--surface); color: var(--ink); border: 1px solid var(--border); }
    #stmtFilter button[data-f="success"] { background: var(--ok-bg); color: var(--ok-fg); border-color: var(--ok-fg); }
    #stmtFilter button[data-f="failed"] { background: var(--danger-bg); color: var(--danger-fg); border-color: var(--danger-fg); }
    #stmtFilter button[data-f="issue"] { background: var(--open-bg); color: var(--open-fg); border-color: var(--open-fg); }
    #stmtFilter button.active { box-shadow: var(--shadow-sm); }
    #stmtFilter button.active[data-f="all"] { background: var(--ink); color: var(--surface); border-color: var(--ink); }
    #stmtFilter button.active[data-f="success"] { background: #16a34a; color: #fff; border-color: #16a34a; }
    #stmtFilter button.active[data-f="failed"] { background: #dc2626; color: #fff; border-color: #dc2626; }
    #stmtFilter button.active[data-f="issue"] { background: #d97706; color: #fff; border-color: #d97706; }
    /* issues filter: Open is red, Resolved is green — solid when selected. */
    #issueFilter button { border: 1px solid var(--border); }
    #issueFilter button[data-f="open"] { background: var(--danger-bg); color: var(--danger-fg); border-color: var(--danger-fg); }
    #issueFilter button[data-f="resolved"] { background: var(--ok-bg); color: var(--ok-fg); border-color: var(--ok-fg); }
    #issueFilter button.active { box-shadow: var(--shadow-sm); }
    #issueFilter button.active[data-f="open"] { background: #dc2626; color: #fff; border-color: #dc2626; }
    #issueFilter button.active[data-f="resolved"] { background: #16a34a; color: #fff; border-color: #16a34a; }
    /* messages filter: selected chip is black in light mode, white in dark mode */
    #msgFilter button.active { background: var(--ink); color: var(--surface); box-shadow: var(--shadow-sm); }
    /* per-row sales status — a colour-only circle that opens a picker */
    .status-dot-btn { width: 20px; height: 20px; border-radius: 50%; border: none; cursor: pointer; padding: 0; display: inline-block; margin-left: 16px; transition: box-shadow 0.15s ease; }
    .status-dot-btn:hover { box-shadow: 0 0 0 2px var(--surface), 0 0 0 3px var(--muted-2); }
    .status-dot-btn.st-open { background: #d97706; }
    .status-dot-btn.st-ok { background: #16a34a; }
    .status-dot-btn.st-off { background: #dc2626; }
    .stat-menu { position: fixed; z-index: 200; display: flex; gap: 8px; padding: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow); }
    .stat-opt { background: none; border: none; cursor: pointer; padding: 4px; border-radius: 6px; display: inline-grid; place-content: center; }
    .stat-opt:hover { background: var(--hover); }
    .stat-opt .st-dot { opacity: 1; cursor: pointer; }
    /* header status-dot filters */
    .st-filter { display: inline-flex; gap: 6px; margin-left: 8px; vertical-align: middle; }
    .st-dot { width: 14px; height: 14px; border-radius: 50%; border: none; cursor: pointer; padding: 0; opacity: 0.55; transition: opacity 0.15s ease, box-shadow 0.15s ease; }
    .st-dot:hover { opacity: 1; }
    .st-dot.active { opacity: 1; box-shadow: 0 0 0 2px var(--surface), 0 0 0 3px var(--muted-2); }
    .st-dot.st-open { background: #d97706; }
    .st-dot.st-ok { background: #16a34a; }
    .st-dot.st-off { background: #dc2626; }
    /* fixed-width sales table: static column sizes so the full data is always
       visible and headers never shift (scrolls horizontally if it overflows). */
    .sales-table { table-layout: fixed; width: 100%; }
    /* Let long values wrap onto multiple lines within their column instead of
       overflowing into the next one. */
    .sales-table th, .sales-table td { white-space: normal; overflow-wrap: anywhere; vertical-align: middle; }
    .sales-table .role-select { width: 100%; }
    /* sales status donut (below the table, right-aligned) with legend in centre */
    /* Messages panel fills the content area and never grows the page. The
       table keeps its fixed height and the donut fills the leftover space. */
    #panel-messages.active { display: flex; flex-direction: column; height: 100%; min-height: 0; }
    #msgList { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; overflow-y: auto; }
    #msgList > .card { flex: 0 0 auto; }   /* table card & message cards keep their height */
    #msgList .feed { display: flex; flex-direction: column; gap: 14px; }
    .sales-chart { flex: 1 1 auto; min-height: 0; display: flex; gap: 16px; align-items: stretch; justify-content: space-between; overflow: hidden; margin-top: 16px; }
    /* card hugs the graph (the bar list is a fixed 300px wide) */
    .typebars-card { flex: 0 0 auto; width: fit-content; align-self: flex-start; max-height: 100%; padding: 16px 18px; display: flex; flex-direction: column; overflow: hidden; }
    /* fixed height so the card is the same size with few, many, or no bars */
    .typebars-card .bank-list { flex: 0 0 auto; height: 230px; max-height: 230px; overflow-y: auto; }
    .typebars-card .bar-row { cursor: pointer; }
    /* thin scrollbar for the bar list */
    /* scrollbar thumb: black in light theme, white in dark theme (var(--ink)) */
    .typebars-card .bank-list { scrollbar-width: thin; scrollbar-color: var(--ink) transparent; }
    .typebars-card .bank-list::-webkit-scrollbar { width: 6px; }
    .typebars-card .bank-list::-webkit-scrollbar-track { background: transparent; }
    .typebars-card .bank-list::-webkit-scrollbar-thumb { background: var(--ink); border-radius: 3px; }
    .typebars-card .bank-list::-webkit-scrollbar-thumb:hover { background: var(--ink); }
    .donut-card { flex: 0 0 auto; height: 100%; max-height: 360px; padding: 12px; display: flex; align-items: center; justify-content: center; }
    .donut-wrap { position: relative; height: 100%; aspect-ratio: 1 / 1; width: auto; }
    .donut { width: 100%; height: 100%; }
    .donut-legend { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; pointer-events: none; }
    .donut-legend > div { display: flex; align-items: center; gap: 7px; font-size: 0.92rem; color: var(--muted); white-space: nowrap; pointer-events: auto; }
    .donut-legend b { color: var(--ink); font-variant-numeric: tabular-nums; }
    .donut-legend .ld { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    /* Type column dropdown filter */
    .th-filter { position: relative; display: inline-flex; align-items: center; margin-left: 4px; vertical-align: middle; }
    .th-arrow { background: none; border: none; cursor: pointer; color: var(--muted-2); padding: 2px; display: inline-grid; place-content: center; border-radius: 4px; }
    .th-arrow:hover { color: var(--ink); }
    .th-arrow.on { color: var(--accent-text); }
    .th-arrow svg { width: 14px; height: 14px; }
    .type-menu { position: fixed; z-index: 200; min-width: 160px; max-height: 260px; overflow: auto;
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow); padding: 4px; }
    .type-menu[hidden] { display: none; }
    .type-opt { display: block; width: 100%; text-align: left; background: none; border: none; cursor: pointer;
      font-family: inherit; font-size: 0.82rem; font-weight: 500; color: var(--ink); padding: 7px 10px;
      border-radius: 7px; white-space: nowrap; text-transform: none; letter-spacing: normal; }
    .type-opt:hover { background: var(--hover); }
    .type-opt.active { background: var(--sel-bg); color: var(--accent-text); font-weight: 600; }

    /* buttons */
    .btn {
      font-family: inherit; font-weight: 600; font-size: 0.88rem; border: 1px solid var(--border);
      cursor: pointer; border-radius: 9px; padding: 8px 14px; background: var(--surface); color: var(--ink-soft);
      display: inline-flex; align-items: center; gap: 7px; transition: all 0.16s ease;
    }
    .btn:hover { background: var(--hover); }
    /* Stronger, more defined borders on the neutral buttons (View PDF, Mark
       resolved, etc.) — excludes the filled primary/danger variants. */
    .btn:not(.btn-primary):not(.btn-danger) { border-color: #cbd5e1; }
    :root[data-theme="dark"] .btn:not(.btn-primary):not(.btn-danger) { border-color: #4b5563; }
    .btn:not(.btn-primary):not(.btn-danger):hover { border-color: #94a3b8; }
    :root[data-theme="dark"] .btn:not(.btn-primary):not(.btn-danger):hover { border-color: #6b7280; }
    .btn-primary { background: var(--accent-strong); border-color: transparent; color: #fff; }
    .btn-primary:hover { background: var(--accent-text); }
    /* Dark mode: --accent-text is a light blue, so hover with white text would
       wash out. Keep a saturated blue on hover instead. */
    :root[data-theme="dark"] .btn-primary:hover { background: #3b82f6; }
    .btn-danger { background: var(--danger-bg); border-color: transparent; color: var(--danger-fg); }
    .btn-danger:hover { filter: brightness(0.97); }
    .btn:disabled { opacity: 0.55; cursor: default; }

    /* table */
    .table-scroll { overflow-x: auto; border-radius: 14px; }
    /* fixed-height scroll area (statements): header stays put, body scrolls */
    .table-scroll.scroll-y { overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    thead th {
      text-align: left; font-weight: 600; color: #565e6b;
      font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.04em;
      padding: 10px 18px; border-bottom: 1px solid var(--border); white-space: nowrap; background: var(--bg);
    }
    /* brighter header text in dark mode for quicker scanning */
    :root[data-theme="dark"] thead th { color: #aeb6c3; }
    /* keep the header in view while the body scrolls in the fixed area */
    .scroll-y thead th { position: sticky; top: 0; z-index: 2; }
    tbody td { padding: 8px 18px; height: 52px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--hover-strong); }
    tbody tr.filler:hover { background: transparent; }
    td.num { font-variant-numeric: tabular-nums; }
    .cell-strong { font-weight: 600; color: var(--ink); }
    .cell-sub { color: var(--muted-2); font-size: 0.82rem; }
    /* secondary "uploaded" time line beneath the date */
    .upload-time { color: var(--muted-2); font-size: 0.74rem; opacity: 0.85; margin-top: 2px; white-space: nowrap; }
    .row-actions { display: flex; gap: 8px; justify-content: flex-end; align-items: center; }

    /* statements breakdown pie chart (below the table) */
    /* bank list pinned left, pie centred to the table, legend right of the pie */
    .chart-wrap { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; column-gap: 44px; margin: 52px 0 6px; }
    .chart-title { font-weight: 600; color: var(--ink); font-size: 0.98rem; }
    .pie { width: 252px; height: 252px; }
    .pie svg { width: 100%; height: 100%; display: block; overflow: visible; }
    /* pie + its legend sit together in the centre column */
    .chart-center { display: flex; align-items: center; gap: 30px; }
    .chart-legend { display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }
    /* owner bar list pinned to the table's right edge */
    .user-block { justify-self: end; }
    .chart-legend { gap: 6px; }
    .lg-item { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; color: var(--ink-soft); cursor: pointer; border-radius: 8px; padding: 3px 8px; transition: background 0.14s ease; }
    .lg-item:hover { background: var(--hover-strong); }
    .lg-item.sel { font-weight: 700; color: var(--seg); }
    .lg-item.dim { opacity: 0.4; }
    .chart-legend .st-icon { margin-left: 0; }
    /* clickable pie slices */
    .pie-slice { cursor: pointer; transition: fill 0.14s ease; }

    /* statements-by-bank ranked bar list (left of the pie) */
    .bank-block { display: flex; flex-direction: column; gap: 10px; justify-self: start; }
    /* fixed height keeps the page size constant — scrolls when there are many banks */
    .bank-list { width: 300px; max-height: 240px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; padding-right: 8px; }
    .bar-row { display: flex; flex-direction: column; gap: 5px; cursor: pointer; border-radius: 8px; padding: 5px 8px; transition: background 0.14s ease; }
    .bar-row:hover { background: var(--hover-strong); }
    .bar-row.sel { background: var(--hover-strong); }
    .bar-row.sel .bar-name { color: var(--accent-text); font-weight: 700; }
    .bar-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; font-size: 0.85rem; }
    .bar-name { color: var(--ink-soft); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-val { color: var(--muted); font-weight: 600; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .bar-track { height: 8px; border-radius: 999px; background: var(--track); overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; background: var(--accent-strong); }

    /* conversion-status icon beside a statement filename */
    .st-icon { display: inline-grid; place-content: center; width: 24px; height: 24px; border-radius: 50%; margin-left: 10px; vertical-align: middle; flex-shrink: 0; }
    .st-icon.ok { background: var(--ok-bg); color: var(--ok-fg); }
    .st-icon.bad { background: var(--danger-bg); color: var(--danger-fg); }
    .st-icon.issue { background: var(--open-bg); color: var(--open-fg); }
    .st-icon svg { width: 15px; height: 15px; }
    /* clickable statement filename → opens the source PDF in view mode */
    .file-link { cursor: pointer; }
    .file-link:hover { color: var(--accent-text); text-decoration: underline; }
    /* icon-only action button (view result) */
    .icon-act { display: inline-grid; place-content: center; width: 34px; height: 34px; border-radius: 9px; border: 1px solid #cbd5e1; background: var(--surface); color: var(--accent-text); cursor: pointer; transition: all 0.16s ease; }
    :root[data-theme="dark"] .icon-act { border-color: #4b5563; }
    .icon-act:hover { background: var(--hover); border-color: #94a3b8; }
    :root[data-theme="dark"] .icon-act:hover { border-color: #6b7280; }
    .icon-act:disabled { opacity: 0.4; cursor: default; color: var(--muted-2); }
    .icon-act svg { width: 18px; height: 18px; }

    /* inline pulsing count badges beside the statement number */
    .count-badge {
      display: inline-grid; place-content: center; vertical-align: middle;
      min-width: 18px; height: 18px; padding: 0 5px; margin-left: 6px;
      border-radius: 999px; font-size: 0.68rem; font-weight: 700; line-height: 1; color: #fff;
      animation: cbPop 0.2s ease;
    }
    .count-badge.red { background: #ef4444; animation: cbPop 0.2s ease, cbPulseRed 2.2s ease-in-out infinite 0.2s; }
    .count-badge.green { background: #16a34a; animation: cbPop 0.2s ease, cbPulseGreen 2.2s ease-in-out infinite 0.2s; }
    @keyframes cbPop { from { transform: scale(0); } to { transform: scale(1); } }
    @keyframes cbPulseRed { 0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); } 50% { box-shadow: 0 0 0 5px rgba(239,68,68,0); } }
    @keyframes cbPulseGreen { 0%, 100% { box-shadow: 0 0 0 0 rgba(22,163,74,0.5); } 50% { box-shadow: 0 0 0 5px rgba(22,163,74,0); } }

    /* badges */
    .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 0.74rem; font-weight: 600; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
    .badge.admin { background: var(--sel-bg); color: var(--accent-text); }
    .badge.ok { background: var(--ok-bg); color: var(--ok-fg); }
    .badge.off { background: var(--danger-bg); color: var(--danger-fg); }
    .badge.open { background: var(--open-bg); color: var(--open-fg); }
    .badge.muted { background: var(--bg); color: var(--muted-2); border: 1px solid var(--border); }
    .badge.sales { background: var(--t-purple-bg); color: var(--t-purple-fg); }
    /* role assignment dropdown in the Users table */
    .role-select { font-family: inherit; font-size: 0.84rem; font-weight: 600; padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--ink); cursor: pointer; }
    .role-select:focus { outline: none; border-color: var(--accent); }
    .role-select:disabled { opacity: 0.6; }

    /* switch */
    .switch { position: relative; display: inline-block; width: 38px; height: 21px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch .slider { position: absolute; inset: 0; cursor: pointer; background: var(--track); border-radius: 999px; transition: 0.2s; }
    .switch .slider::before { content: ""; position: absolute; height: 15px; width: 15px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: 0.2s; box-shadow: var(--shadow-sm); }
    .switch input:checked + .slider { background: var(--accent); }
    .switch input:checked + .slider::before { transform: translateX(17px); }
    .switch input:disabled + .slider { opacity: 0.5; cursor: default; }

    /* Instant tooltips (the native title attribute has a ~1s browser delay). */
    [data-tip] { position: relative; }
    [data-tip]::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 8px); left: 50%;
      transform: translateX(-50%);
      background: var(--ink); color: var(--surface);
      padding: 5px 9px; border-radius: 7px;
      font-size: 0.74rem; font-weight: 600; white-space: nowrap;
      box-shadow: var(--shadow); opacity: 0; pointer-events: none;
      transition: opacity 0.1s ease; z-index: 50;
    }
    [data-tip]:hover::after, [data-tip]:focus-within::after { opacity: 1; }

    /* message / issue list */
    .feed { display: flex; flex-direction: column; gap: 14px; }
    .feed-card { padding: 18px 20px; }
    .feed-card.resolved { opacity: 0.7; }
    .feed-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
    .feed-who { font-weight: 600; color: var(--ink); }
    .feed-contact { color: var(--muted-2); font-size: 0.84rem; margin-top: 2px; }
    .feed-subject { font-weight: 600; margin-top: 12px; color: var(--ink); }
    .feed-body { color: var(--ink-soft); margin-top: 4px; white-space: pre-wrap; word-break: break-word; }
    .feed-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
    .feed-time { color: var(--muted-2); font-size: 0.8rem; }

    /* states */
    .state { text-align: center; padding: 56px 24px; }
    .state .sic { width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 16px; background: var(--sel-bg); color: var(--accent-text); display: grid; place-content: center; }
    .state .sic svg { width: 26px; height: 26px; }
    .state h2 { font-size: 1.15rem; font-weight: 600; color: var(--ink); }
    .state p { color: var(--muted); margin-top: 8px; max-width: 420px; margin-left: auto; margin-right: auto; }
    .state .btn { margin-top: 20px; }
    .spinner { width: 34px; height: 34px; margin: 0 auto; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* theme icon swap */
    .ico-moon { display: none; }
    [data-theme="dark"] .ico-moon { display: block; }
    [data-theme="dark"] .ico-sun { display: none; }

    /* toast */
    .toast {
      position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
      background: var(--ink); color: var(--bg); padding: 12px 20px; border-radius: 12px;
      font-size: 0.9rem; font-weight: 600; box-shadow: var(--shadow-lg);
      opacity: 0; pointer-events: none; transition: opacity 0.2s ease, transform 0.2s ease; z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* confirm modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 300; padding: 24px;
      display: none; place-items: center;
      background: rgba(15, 23, 42, 0.55); backdrop-filter: blur(3px);
      opacity: 0; transition: opacity 0.18s ease;
    }
    [data-theme="dark"] .modal-overlay { background: rgba(0, 0, 0, 0.62); }
    .modal-overlay.show { display: grid; opacity: 1; }
    .modal {
      width: 100%; max-width: 420px; text-align: center; padding: 28px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; box-shadow: var(--shadow-lg);
      transform: translateY(10px) scale(0.97); transition: transform 0.18s ease;
    }
    .modal-overlay.show .modal { transform: none; }
    .modal-ic {
      width: 52px; height: 52px; border-radius: 14px; margin: 0 auto 16px;
      display: grid; place-content: center; background: var(--sel-bg); color: var(--accent-text);
    }
    .modal-ic.danger { background: var(--danger-bg); color: var(--danger-fg); }
    .modal-ic svg { width: 26px; height: 26px; }
    .modal h3 { font-size: 1.18rem; font-weight: 700; color: var(--ink); }
    .modal p { color: var(--muted); margin-top: 8px; font-size: 0.92rem; line-height: 1.55; }
    .modal-actions { display: flex; gap: 10px; justify-content: center; margin-top: 24px; }
    .modal-actions .btn { min-width: 112px; justify-content: center; padding: 10px 16px; }

    /* full-screen gate (non-admins) */
    .gate-wrap { display: grid; place-content: center; min-height: 100vh; width: 100%; padding: 24px; }
  </style>
</head>
<body>

  <!-- Non-admins / signed-out users see only this; replaced by the shell for admins. -->
  <div class="gate-wrap" id="gate" style="display:none;"></div>

  <div class="shell" id="shell" style="display:none;">
    <!-- ===================== Sidebar ===================== -->
    <nav class="sidebar" id="sidebar">
      <div class="side-top">
        <div class="side-brand">
          <div class="brand-left">
            <div class="brand-logo">
              <img src="assets/logo-mark-white.png" alt="Ledgerit" />
            </div>
            <div class="brand-meta">
              <span class="t">Ledgerit</span>
              <span class="s">Admin Console</span>
            </div>
          </div>
          <button class="icon-btn side-theme" type="button" aria-label="Toggle theme" onclick="toggleTheme()">
            <svg class="ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
      </div>

      <div class="side-nav">
        <button class="nav-opt active" data-tab="dashboard">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"/><path d="M9 21v-6h6v6"/></svg></span>
          <span class="lbl">Dashboard</span>
        </button>
        <button class="nav-opt" data-tab="users">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
          <span class="lbl">Users</span>
        </button>
        <button class="nav-opt" data-tab="statements">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>
          <span class="lbl">Statements</span>
        </button>
        <button class="nav-opt" data-tab="messages">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
          <span class="lbl">Messages</span>
          <span class="notif" id="nMessages" hidden>0</span>
        </button>

          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></span>
          <span class="lbl">Issues</span>
          <span class="notif" id="nIssues" hidden>0</span>
        </button>

        <div class="side-sep"></div>
        <div class="side-label">Account</div>
        <button class="nav-opt" onclick="window.location.href='/upload.html'">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M2 15h10"/><path d="m9 18 3-3-3-3"/></svg></span>
          <span class="lbl">Convert</span>

        <button class="nav-opt" id="logoutBtn" onclick="logout()">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
          <span class="lbl">Logout</span>

      <button class="side-toggle" id="sideToggle" onclick="toggleSidebar()">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg></span>
        <span class="lbl">Collapse</span>

    <!-- ===================== Main ===================== -->
    <div class="main">
      <section class="panel active" id="panel-dashboard"></section>
      <section class="panel" id="panel-users"></section>

  <!-- Themed confirmation dialog (replaces window.confirm). -->
  <div class="modal-overlay" id="confirmOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmMsg">
      <div class="modal-ic" id="confirmIc">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </div>
      <h3 id="confirmTitle">Are you sure?</h3>
      <p id="confirmMsg"></p>
      <div class="modal-actions">
        <button class="btn" id="confirmCancel" type="button">Cancel</button>
        <button class="btn btn-danger" id="confirmOk" type="button">Confirm</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ---- Theme (shared with the rest of the app via data-theme + localStorage) ----
    function applyTheme(t) {
      document.documentElement.setAttribute("data-theme", t);
      try { localStorage.setItem("theme", t); } catch (e) {}
      var m = document.querySelector('meta[name="theme-color"]');
      if (m) m.setAttribute("content", t === "dark" ? "#030712" : "#ffffff");
    }
    function toggleTheme() {
      var cur = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
      applyTheme(cur === "dark" ? "light" : "dark");
    }

    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("collapsed");
    }

    // ---- Helpers ----
    function escHtml(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }
    function fmtDate(iso) {
      if (!iso) return "—";
      var d = new Date(iso);
      if (isNaN(d)) return "—";
      return d.toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" });
    }
    function fmtDateTime(iso) {
      if (!iso) return "—";
      var d = new Date(iso);
      if (isNaN(d)) return "—";
      return fmtDate(iso) + ", " + d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
    }
    // "Uploaded" column: the exact upload date and clock time, pinned to IST
    // (Asia/Kolkata) regardless of the viewer's browser timezone. No relative
    // times ("5.7 hours ago") — the admin needs the precise moment.
    function fmtISTDate(iso) {
      if (!iso) return "—";
      var d = new Date(iso);
      if (isNaN(d)) return "—";
      return d.toLocaleDateString("en-IN", {
        timeZone: "Asia/Kolkata",
        day: "numeric", month: "short", year: "numeric"
      });
    }
    function fmtISTTime(iso) {
      if (!iso) return "";
      var d = new Date(iso);
      if (isNaN(d)) return "";
      return d.toLocaleTimeString("en-IN", {
        timeZone: "Asia/Kolkata",
        hour: "numeric", minute: "2-digit", second: "2-digit", hour12: true
      }).toUpperCase() + " IST";
    }
    function fmtNum(n) { return (n || 0).toLocaleString(); }

    var toastTimer = null;
    function showToast(msg) {
      var t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { t.classList.remove("show"); }, 2600);
    }

    // Themed confirmation dialog. Returns a Promise that resolves true on
    // confirm, false on cancel / Escape / backdrop click.
    function confirmDialog(opts) {
      opts = opts || {};
      return new Promise(function (resolve) {
        var overlay = document.getElementById("confirmOverlay");
        var okBtn = document.getElementById("confirmOk");
        var cancelBtn = document.getElementById("confirmCancel");
        var ic = document.getElementById("confirmIc");

        document.getElementById("confirmTitle").textContent = opts.title || "Are you sure?";
        document.getElementById("confirmMsg").textContent = opts.message || "";
        okBtn.textContent = opts.confirmText || "Confirm";
        cancelBtn.textContent = opts.cancelText || "Cancel";
        okBtn.className = "btn " + (opts.danger ? "btn-danger" : "btn-primary");
        ic.className = "modal-ic" + (opts.danger ? " danger" : "");

        function close(result) {
          overlay.classList.remove("show");
          overlay.setAttribute("aria-hidden", "true");
          okBtn.removeEventListener("click", onOk);
          cancelBtn.removeEventListener("click", onCancel);
          overlay.removeEventListener("click", onBackdrop);
          document.removeEventListener("keydown", onKey);
          resolve(result);
        }
        function onOk() { close(true); }
        function onCancel() { close(false); }
        function onBackdrop(e) { if (e.target === overlay) close(false); }
        function onKey(e) {
          if (e.key === "Escape") close(false);
          else if (e.key === "Enter") close(true);
        }

        okBtn.addEventListener("click", onOk);
        cancelBtn.addEventListener("click", onCancel);
        overlay.addEventListener("click", onBackdrop);
        document.addEventListener("keydown", onKey);

        overlay.setAttribute("aria-hidden", "false");
        overlay.classList.add("show");
        okBtn.focus();
      });
    }
